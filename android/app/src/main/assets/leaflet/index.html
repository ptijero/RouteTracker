<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8"/>

    <meta name="viewport"
          content="width=device-width, initial-scale=1"/>

    <link
            rel="stylesheet"
            href="file:///android_asset/leaflet/leaflet.css"/>

    <script
            src="file:///android_asset/leaflet/leaflet.js">
    </script>

    <style>

        html,
        body,
        #map{

            width:100%;
            height:100%;
            margin:0;
            padding:0;

        }

    </style>

</head>

<body>
<div id="map"></div>

<script>

    const company = [-12.0602,-77.0413];

    const map = L.map("map").setView(company,16);

    L.tileLayer(
        'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
        {
            maxZoom:19
        }
    ).addTo(map);

    const marker = L.marker(company)
        .addTo(map)
        .bindPopup("Mi Empresa")
        .openPopup();

    window.moveMarker = function(latitude, longitude){

        const point = [latitude, longitude];

        marker.setLatLng(point);

        map.panTo(point);

    }
    window.ReactNativeWebView?.postMessage("Leaflet listo");
</script>

</body>

</html>
