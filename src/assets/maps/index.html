<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8"/>

    <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0"/>

    <style>

        html,
        body,
        #map{

            height:100%;

            margin:0;

            padding:0;

        }

    </style>
    <link
            rel="stylesheet"
            href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <script
            src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
    </script>
</head>

<body>

<div id="map"></div>
<script>

    const map = L.map("map").setView(

        [-12.0464,-77.0428],

        15

    );

    L.tileLayer(

        'https://tile.openstreetmap.org/{z}/{x}/{y}.png',

        {

            maxZoom:19

        }

    ).addTo(map);

</script>
</body>

</html>
